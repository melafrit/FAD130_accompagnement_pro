# Boussole — déploiement LOCAL (pour tester sur ta machine).
# Publie le front sur http://localhost:8080 ; l'API reste interne (proxifiée par Nginx).
# Aucune dépendance au reverse proxy (contrairement au docker-compose.yml de production).
#
#   cd app
#   docker compose -f docker-compose.local.yml up --build
#   → http://localhost:8080

name: boussole

services:
  boussole-api:
    build: ./api
    image: boussole-api
    container_name: boussole-api-local
    restart: unless-stopped
    environment:
      - PORT=3000
      - DB_PATH=/app/data/boussole.sqlite
      - APP_URL=http://localhost:8080
      - ADMIN_EMAIL=mohamed@elafrit.com
      - ACCOMPAGNATEUR_EMAIL=elafrit.mohamed@gmail.com
      - SEED_PASSWORD=BoussoleDemo2026   # comptes de démo prêts à l'emploi (LOCAL uniquement)
      - RATE_LIMIT_DISABLED=1            # LOCAL : la batterie se connecte des centaines de fois (prod : activer)
      # Clés optionnelles : si tu crées un fichier app/.env avec ces variables, elles sont injectées ici.
      # Sans clé, l'IA bascule sur le parcours de secours et les emails sont journalisés dans les logs.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - MAIL_FROM=${MAIL_FROM:-contact@elafrit.com}
    volumes:
      - ./data:/app/data
    networks:
      - interne

  boussole-web:
    build: ./web
    image: boussole-web
    container_name: boussole-web-local
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - boussole-api
    networks:
      - interne

networks:
  interne:
    driver: bridge
