# Boussole — orchestration des containers (déploiement VPS OVH).
#
# ⚠️ COEXISTENCE : le VPS expose DÉJÀ un reverse proxy Caddy
# (container `formaplanner-caddy-1`, Caddyfile statique `/opt/FormaPlanner/Caddyfile`)
# qui tient les ports 80/443. Boussole NE prend PAS 80/443 : son front s'attache
# au réseau de ce Caddy (EDGE_NETWORK = `formaplanner_formaplanner`) pour qu'il
# puisse l'atteindre. Le routage HTTPS se fait en ajoutant un bloc de site au
# Caddyfile (voir livrables/Guide_deploiement_Boussole.md) :
#
#     boussole.elafrit.com {
#         reverse_proxy boussole-web:80
#     }
#
# Caddy génère alors automatiquement le certificat Let's Encrypt.

services:
  boussole-api:
    build: ./api
    container_name: boussole-api
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=3000
      - DB_PATH=/app/data/boussole.sqlite
    volumes:
      - ./data:/app/data
    networks:
      - interne

  boussole-web:
    build: ./web
    container_name: boussole-web
    restart: unless-stopped
    depends_on:
      - boussole-api
    networks:
      - interne        # pour joindre boussole-api (proxy /api dans nginx)
      - edge           # réseau du Caddy de façade (il atteint boussole-web:80)

networks:
  interne:
    driver: bridge
  edge:
    external: true
    name: ${EDGE_NETWORK}
