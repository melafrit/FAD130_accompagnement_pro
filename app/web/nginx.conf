server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API : proxifiée vers le container boussole-api (réseau Docker interne)
  location /api/ {
    proxy_pass http://boussole-api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Front SPA : fallback vers index.html + en-têtes de sécurité du document HTML.
  # (Les réponses /api/ gardent les en-têtes posés par helmet côté API.)
  location / {
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri $uri/ /index.html;
  }
}
